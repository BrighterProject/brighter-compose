services:
  traefik:
    image: traefik
    command:
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--api.dashboard=true"
      - "--api.insecure=true"
    ports:
      - "80:80"
      - "8080:8080"  # dashboard
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - backend

  frontend:
    build:
      context: ./brighter-frontend
      args:
        VITE_GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
        VITE_TURNSTILE_SITE_KEY: ${VITE_TURNSTILE_SITE_KEY}
    networks:
      - backend
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.frontend.rule=PathPrefix(`/`)"
      - "traefik.http.routers.frontend.entrypoints=web"
      - "traefik.http.routers.frontend.priority=1"
      - "traefik.http.services.frontend-svc.loadbalancer.server.port=3000"

  admin-panel:
    build: ./brighter-admin-panel
    networks:
      - backend
    environment:
      VITE_BASENAME: "/admin"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.admin.rule=PathPrefix(`/admin`)"
      - "traefik.http.routers.admin.priority=5"
      - "traefik.http.routers.admin.entrypoints=web"
      - "traefik.http.middlewares.admin-strip.stripprefix.prefixes=/admin"
      - "traefik.http.routers.admin.middlewares=admin-strip"
      - "traefik.http.services.admin-svc.loadbalancer.server.port=3000"

  users-ms:
    build: ./brighter-users-ms
    environment:
      DB_URL: ${DB_URL:-postgres://brighter:brighter@db:5432/brighter}
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-120}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      LOG_LEVEL: ${LOG_LEVEL:-DEBUG}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      CONTACT_EMAIL: ${CONTACT_EMAIL}
      TURNSTILE_SECRET_KEY: ${TURNSTILE_SECRET_KEY}
      NOTIFICATIONS_MS_URL: ${NOTIFICATIONS_MS_URL:-http://notifications-ms:8004}
      FRONTEND_BASE_URL: ${FRONTEND_BASE_URL:-http://localhost}
      FORWARDED_ALLOW_IPS: "*"
    networks:
      - backend
    depends_on:
      - db
      - redis
      - notifications-ms
    labels:
      - "traefik.enable=true"
      # strip /api prefix before forwarding
      - "traefik.http.middlewares.api-strip.stripprefix.prefixes=/api"
      # forwardAuth middleware (internal URL — no /api prefix)
      - "traefik.http.middlewares.jwt-auth.forwardauth.address=http://users-ms:8000/auth/verify"
      - "traefik.http.middlewares.jwt-auth.forwardauth.authResponseHeaders=X-User-Id,X-User-Scopes,X-Username"
      # no auth
      - "traefik.http.routers.users-public.rule=PathPrefix(`/api/auth`) || (Method(`POST`) && PathPrefix(`/api/users`)) || Method(`OPTIONS`)"
      - "traefik.http.routers.users-public.entrypoints=web"
      - "traefik.http.routers.users-public.middlewares=api-strip"
      - "traefik.http.routers.users-public.service=users-ms-svc"
      # protected
      - "traefik.http.routers.users-protected.rule=PathPrefix(`/api/users`) || PathPrefix(`/api/scopes`)"
      - "traefik.http.routers.users-protected.entrypoints=web"
      - "traefik.http.routers.users-protected.middlewares=jwt-auth,api-strip"
      - "traefik.http.routers.users-protected.service=users-ms-svc"
      # service def
      - "traefik.http.services.users-ms-svc.loadbalancer.server.port=8000"

  properties-ms:
    build: ./brighter-properties-ms
    environment:
      DB_URL: ${DB_URL:-postgres://brighter:brighter@db:5432/brighter}
      USERS_MS_URL: ${USERS_MS_URL:-http://users-ms:8000}
      BOOKINGS_MS_URL: ${BOOKINGS_MS_URL:-http://bookings-ms:8002}
      NOTIFICATIONS_MS_URL: ${NOTIFICATIONS_MS_URL:-http://notifications-ms:8004}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      FORWARDED_ALLOW_IPS: "*"
    networks:
      - backend
    depends_on:
      - db
      - notifications-ms
    labels:
      - "traefik.enable=true"
      # no auth: read-only property browsing + OPTIONS preflight
      - "traefik.http.routers.properties-public.rule=(Method(`GET`) || Method(`OPTIONS`)) && PathPrefix(`/api/properties`)"
      - "traefik.http.routers.properties-public.entrypoints=web"
      - "traefik.http.routers.properties-public.middlewares=api-strip"
      - "traefik.http.routers.properties-public.service=properties-svc"
      - "traefik.http.routers.properties-public.priority=10"
      # protected: POST / PATCH / DELETE on /properties
      - "traefik.http.routers.properties.rule=PathPrefix(`/api/properties`)"
      - "traefik.http.routers.properties.entrypoints=web"
      - "traefik.http.routers.properties.middlewares=jwt-auth,api-strip"
      - "traefik.http.routers.properties.service=properties-svc"
      - "traefik.http.routers.properties.priority=5"
      # service
      - "traefik.http.services.properties-svc.loadbalancer.server.port=8001"

  bookings-ms:
    build: ./brighter-bookings-ms
    environment:
      DB_URL: ${DB_URL:-postgres://brighter:brighter@db:5432/brighter}
      USERS_MS_URL: ${USERS_MS_URL:-http://users-ms:8000}
      PROPERTIES_MS_URL: ${PROPERTIES_MS_URL:-http://properties-ms:8001}
      PAYMENTS_MS_URL: ${PAYMENTS_MS_URL:-http://payments-ms:8003}
      NOTIFICATIONS_MS_URL: ${NOTIFICATIONS_MS_URL:-http://notifications-ms:8004}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      LOG_LEVEL: ${LOG_LEVEL:-DEBUG}
      FORWARDED_ALLOW_IPS: "*"
    networks:
      - backend
    depends_on:
      - db
      - redis
      - notifications-ms
    labels:
      - "traefik.enable=true"
      # no auth: OPTIONS preflight + GET /bookings/slots (public calendar endpoint)
      - "traefik.http.routers.bookings-public.rule=(Method(`OPTIONS`) && PathPrefix(`/api/bookings`)) || (Method(`GET`) && Path(`/api/bookings/slots`))"
      - "traefik.http.routers.bookings-public.entrypoints=web"
      - "traefik.http.routers.bookings-public.middlewares=api-strip"
      - "traefik.http.routers.bookings-public.service=bookings-svc"
      - "traefik.http.routers.bookings-public.priority=10"
      # protected
      - "traefik.http.routers.bookings.rule=PathPrefix(`/api/bookings`)"
      - "traefik.http.routers.bookings.entrypoints=web"
      - "traefik.http.routers.bookings.middlewares=jwt-auth,api-strip"
      - "traefik.http.routers.bookings.service=bookings-svc"
      - "traefik.http.routers.bookings.priority=5"
      - "traefik.http.services.bookings-svc.loadbalancer.server.port=8002"

  payments-ms:
    build: ./brighter-payments-ms
    env_file: .env
    environment:
      DB_URL: ${DB_URL:-postgres://brighter:brighter@db:5432/brighter}
      BOOKINGS_MS_URL: ${BOOKINGS_MS_URL:-http://bookings-ms:8002}
      NOTIFICATIONS_MS_URL: ${NOTIFICATIONS_MS_URL:-http://notifications-ms:8004}
      FORWARDED_ALLOW_IPS: "*"
      STRIPE_SUCCESS_URL: ${STRIPE_SUCCESS_URL:-http://localhost/bookings?payment=success}
      STRIPE_CANCEL_URL: ${STRIPE_CANCEL_URL:-http://localhost/bookings?payment=cancelled}
      STRIPE_CHECKOUT_EXPIRES_MINUTES: ${STRIPE_CHECKOUT_EXPIRES_MINUTES:-30}
    networks:
      - backend
    depends_on:
      - db
      - notifications-ms
    labels:
      - "traefik.enable=true"
      # PUBLIC: Stripe webhook — must not require JWT (Stripe cannot provide one)
      # Priority 20 ensures this matches before the protected catch-all below
      - "traefik.http.routers.payments-webhook.rule=Method(`POST`) && (Path(`/api/payments/webhook`) || Path(`/api/payments/connect/webhook`))"
      - "traefik.http.routers.payments-webhook.entrypoints=web"
      - "traefik.http.routers.payments-webhook.middlewares=api-strip"
      - "traefik.http.routers.payments-webhook.service=payments-svc"
      - "traefik.http.routers.payments-webhook.priority=20"
      # PUBLIC: OPTIONS preflight
      - "traefik.http.routers.payments-public.rule=Method(`OPTIONS`) && PathPrefix(`/api/payments`)"
      - "traefik.http.routers.payments-public.entrypoints=web"
      - "traefik.http.routers.payments-public.middlewares=api-strip"
      - "traefik.http.routers.payments-public.service=payments-svc"
      - "traefik.http.routers.payments-public.priority=10"
      # Protected: all other /payments routes require JWT
      - "traefik.http.routers.payments.rule=PathPrefix(`/api/payments`)"
      - "traefik.http.routers.payments.entrypoints=web"
      - "traefik.http.routers.payments.middlewares=jwt-auth,api-strip"
      - "traefik.http.routers.payments.service=payments-svc"
      - "traefik.http.routers.payments.priority=5"
      - "traefik.http.services.payments-svc.loadbalancer.server.port=8003"

  notifications-ms:
    build: ./brighter-notifications-ms
    environment:
      DB_URL: ${DB_URL:-postgres://brighter:brighter@db:5432/brighter}
      RESEND_API_KEY: ${RESEND_API_KEY}
      DEFAULT_FROM_EMAIL: ${DEFAULT_FROM_EMAIL:-Ploshtadka.BG <noreply@площадка.бг>}
      FRONTEND_BASE_URL: ${FRONTEND_BASE_URL:-http://localhost}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      FORWARDED_ALLOW_IPS: "*"
    networks:
      - backend
    depends_on:
      - db
    labels:
      - "traefik.enable=true"
      # no auth: OPTIONS preflight
      - "traefik.http.routers.notifications-public.rule=Method(`OPTIONS`) && PathPrefix(`/api/notifications`)"
      - "traefik.http.routers.notifications-public.entrypoints=web"
      - "traefik.http.routers.notifications-public.middlewares=api-strip"
      - "traefik.http.routers.notifications-public.service=notifications-svc"
      - "traefik.http.routers.notifications-public.priority=10"
      # protected
      - "traefik.http.routers.notifications.rule=PathPrefix(`/api/notifications`)"
      - "traefik.http.routers.notifications.entrypoints=web"
      - "traefik.http.routers.notifications.middlewares=jwt-auth,api-strip"
      - "traefik.http.routers.notifications.service=notifications-svc"
      - "traefik.http.routers.notifications.priority=5"
      - "traefik.http.services.notifications-svc.loadbalancer.server.port=8004"

  redis:
    image: redis:7-alpine
    networks:
      - backend

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: brighter
      POSTGRES_USER: brighter
      POSTGRES_PASSWORD: brighter
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - backend

volumes:
  pgdata:

networks:
  backend:
